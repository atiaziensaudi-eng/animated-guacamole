
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FuelPro Ultimate Merged</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#faf5f5;
  --card:#ffffff;
  --bd:#f5c6c6;
  --ac:#c00000;
  --tx:#1a0000;
}
body{
  margin:0;
  font-family:'Tajawal',sans-serif;
  background:var(--bg);
  color:var(--tx);
}
.topbar{
  background:linear-gradient(135deg,#c00000,#a00000);
  color:#fff;
  padding:14px;
  font-weight:900;
  text-align:center;
}
.container{
  padding:14px;
}
.card{
  background:#fff;
  border:1px solid var(--bd);
  border-radius:14px;
  padding:14px;
  margin-bottom:10px;
}
.btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:var(--ac);
  color:#fff;
  font-weight:800;
  cursor:pointer;
}
.input{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid var(--bd);
  margin-bottom:8px;
}
.stat{
  font-size:22px;
  font-weight:900;
  color:var(--ac);
}
</style>
</head>

<body>

<div class="topbar">FuelPro Ultimate 🔥</div>

<div class="container">

<div class="card">
<h3>تسجيل الدخول</h3>
<input class="input" placeholder="اسم المستخدم">
<input class="input" placeholder="كلمة المرور" type="password">
<button class="btn" onclick="login()">دخول</button>
</div>

<div id="app" style="display:none">

<div class="card">
<h3>الإحصائيات</h3>
<div class="stat" id="total">0</div>
</div>

<div class="card">
<h3>إدخال قراءة مضخة</h3>
<input class="input" id="reading" placeholder="ادخل القراءة">
<button class="btn" onclick="add()">حفظ</button>
</div>

<div class="card">
<h3>السجل</h3>
<div id="log"></div>
</div>

</div>

</div>

<script>
let total = 0;

function login(){
  document.querySelector("#app").style.display = "block";
}

function add(){
  let val = Number(document.getElementById("reading").value);
  if(!val) return;

  total += val;
  document.getElementById("total").innerText = total;

  let log = document.getElementById("log");
  let item = document.createElement("div");
  item.innerText = "تمت إضافة: " + val;
  log.appendChild(item);
}
</script>

</body>
</html>
